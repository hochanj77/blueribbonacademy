name: Sync to Client Repository

on:
  push:
    branches: ['main']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to client repo
        env:
          CLIENT_PAT: ${{ secrets.CLIENT_REPO_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${CLIENT_PAT}@github.com" > ~/.git-credentials
          git remote add client https://github.com/Blue-Ribbon-Academy/blueribbon-nj.git
          git push client main --force
